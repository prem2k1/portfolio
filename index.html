<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Scroll Test</title>
  <style>
    /* Reset basic layout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: auto;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: sans-serif;
      background-color: #fff;
    }

    .section {
      min-height: 100vh;
      padding: 30px;
      background-color: #f4f4f4;
      border-bottom: 2px solid #ddd;
    }

    .section:nth-child(even) {
      background-color: #e0e0e0;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="section">
    <h1>Section 1</h1>
    <p>This is the first section.</p>
  </div>
  <div class="section">
    <h1>Section 2</h1>
    <p>This is the second section.</p>
  </div>
  <div class="section">
    <h1>Section 3</h1>
    <p>This is the third section.</p>
  </div>
  <div class="section">
    <h1>Section 4</h1>
    <p>This is the fourth section.</p>
  </div>
</body>
</html>
